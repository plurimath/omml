inherit_from:
  - https://raw.githubusercontent.com/riboseinc/oss-guides/master/ci/rubocop.yml
  - .rubocop_todo.yml

plugins:
- rubocop-performance
- rubocop-rake
- rubocop-rspec

AllCops:
  TargetRubyVersion: 3.0
  NewCops: enable
  Exclude:
    - 'vendor/**/*'

Metrics/BlockLength:
  AllowedMethods:
    - choice
    - xml

RSpec/ExampleLength:
  Max: 20

RSpec/MultipleExpectations:
  Max: 10
